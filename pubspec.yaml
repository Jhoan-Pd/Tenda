name: tenda
description: "Tenda - Sistema de gestión para tiendas de barrio: inventario, precios, facturas con IA, deudas y fiados."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  # Estado
  provider: ^6.1.2
  # Base de datos local (gratis, sin servidor)
  sqflite: ^2.4.1
  path: ^1.9.0
  # Formato de moneda (pesos colombianos) y fechas
  intl: ^0.20.2
  # Foto de facturas
  image_picker: ^1.1.2
  # Llamadas a la API de Grok (xAI)
  http: ^1.2.2
  # Preferencias (margen por defecto, API key, nombre de la tienda)
  shared_preferences: ^2.3.3
  # Venta por voz: transcripción de voz a texto con el motor del teléfono (gratis)
  speech_to_text: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
