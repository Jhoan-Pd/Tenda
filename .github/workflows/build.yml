name: Build APK

# Compila la app gratis en GitHub Actions.
# - En cada push a main: analiza, corre tests y construye el APK (queda como artifact).
# - Al crear un tag v* (ej: v1.0.0): además publica el APK en GitHub Releases
#   para descargarlo e instalarlo directamente en el teléfono.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Permite que el token de Actions cree el Release y suba el APK.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Instalar dependencias
        run: flutter pub get

      - name: Analizar código
        run: flutter analyze

      - name: Ejecutar tests
        run: flutter test

      - name: Construir APK
        run: flutter build apk --release

      - name: Subir APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: tenda-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Publicar en GitHub Releases
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
